<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Buddy - Learn Smarter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            min-height: 100vh;
            color: #1a1a2e;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #666;
            font-size: 1rem;
        }

        .input-section {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0, 102, 255, 0.08);
            margin-bottom: 2rem;
            animation: slideUp 0.6s ease-out;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 0.875rem 1.25rem;
            border: 2px solid #e0e7ff;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        .btn {
            padding: 0.875rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 255, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary.loading {
            opacity: 0.8;
            pointer-events: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .content-section {
            animation: fadeIn 0.6s ease-out;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0, 102, 255, 0.08);
            margin-bottom: 2rem;
            border-left: 4px solid #0066ff;
        }

        .card.explanation {
            border-left-color: #00cc88;
        }

        .card.challenge {
            border-left-color: #ff6b35;
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card.explanation h2::before {
            content: '💡';
        }

        .card.challenge h2::before {
            content: '⚡';
        }

        .questions-container {
            display: grid;
            gap: 1rem;
        }

        .question {
            background: #f8f9ff;
            border: 2px solid #e0e7ff;
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .question:hover {
            border-color: #0066ff;
            box-shadow: 0 4px 12px rgba(0, 102, 255, 0.15);
            transform: translateX(4px);
        }

        .question.active {
            border-color: #0066ff;
            background: #f0f4ff;
        }

        .question-number {
            font-size: 0.875rem;
            color: #0066ff;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #1a1a2e;
        }

        .options {
            display: grid;
            gap: 0.75rem;
        }

        .option {
            background: white;
            border: 2px solid #e0e7ff;
            border-radius: 8px;
            padding: 0.875rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option:hover {
            border-color: #0066ff;
            background: #f8faff;
        }

        .option.selected {
            border-color: #0066ff;
            background: #e8f0ff;
            font-weight: 600;
        }

        .option.correct {
            border-color: #00cc88;
            background: #e8f8f0;
            color: #00aa66;
        }

        .option.incorrect {
            border-color: #ff6b35;
            background: #ffe8e0;
            color: #cc4422;
        }

        .explanation-text {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 1.5rem;
            line-height: 1.6;
            color: #333;
            font-size: 1rem;
        }

        .challenge-text {
            background: #fff8f0;
            border-radius: 12px;
            padding: 1.5rem;
            line-height: 1.6;
            color: #333;
            font-size: 1rem;
        }

        .answer-feedback {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .answer-feedback.correct {
            background: #e8f8f0;
            color: #00aa66;
        }

        .answer-feedback.incorrect {
            background: #ffe8e0;
            color: #cc4422;
        }

        .error-message {
            background: #ffe8e0;
            color: #cc4422;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            border-left: 4px solid #ff6b35;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #999;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .btn-secondary {
            background: linear-gradient(135deg, #999 0%, #777 100%);
            color: white;
            margin-top: 1.5rem;
            box-shadow: 0 4px 15px rgba(100, 100, 100, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100, 100, 100, 0.4);
        }

        .score-display {
            background: #e8f0ff;
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1.5rem;
            text-align: center;
            color: #0066ff;
            font-weight: 600;
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 1.875rem;
            }

            .input-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .card {
                padding: 1.5rem;
            }

            .challenge-text {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Study Buddy</h1>
            <p>Master any topic with AI-powered quizzes and challenges</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="topicInput" 
                    placeholder="Enter a topic to study (e.g., 'Photosynthesis', 'Python decorators')"
                >
                <button class="btn btn-primary" id="generateBtn">
                    <span>Generate Study Content</span>
                </button>
            </div>
        </div>

        <div id="contentArea"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
